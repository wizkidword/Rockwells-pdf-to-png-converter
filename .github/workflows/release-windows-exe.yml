name: Release Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows EXE
        shell: bash
        run: |
          rm -rf build dist app.spec
          pyinstaller --noconfirm --clean --onefile --windowed --name pdf-to-png-gui app.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-to-png-gui-windows-exe
          path: dist/pdf-to-png-gui.exe
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/pdf-to-png-gui.exe
          generate_release_notes: true
